{% extends "core/base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<main class="min-h-screen pt-32 pb-20 bg-surface-container-lowest flex items-center justify-center">
    <div class="max-w-md w-full mx-auto px-6 text-center">
        <div class="w-24 h-24 bg-error-container text-error rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="material-symbols-outlined text-6xl">public_off</span>
        </div>
        <h1 class="text-4xl font-serif italic text-primary mb-4">404</h1>
        <h2 class="text-xl font-bold text-primary mb-2">Looks like you're lost.</h2>
        <p class="text-outline mb-8">We couldn't find the page you are looking for. It might have been moved or deleted.</p>
        
        <a href="{% url 'home' %}" class="inline-flex items-center gap-2 bg-primary text-on-primary px-8 py-4 rounded-xl font-bold hover:bg-primary/90 transition-colors shadow-lg">
            <span class="material-symbols-outlined text-sm">home</span>
            Return Home
        </a>
    </div>
</main>
{% endblock %}
