{% extends "core/base.html" %}

{% block content %}
<main class="min-h-screen pt-32 pb-20 flex items-center justify-center bg-surface-container-lowest">
    <div class="w-full max-w-md bg-surface-container-low p-10 rounded-[2rem] shadow-xl border border-outline-variant/20">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-serif italic text-primary mb-2">Welcome Back</h1>
            <p class="text-outline text-sm">Sign in to manage your expedition bookings</p>
        </div>
        
        <form method="post" class="space-y-5">
            {% csrf_token %}
            {% if form.errors %}
            <div class="bg-error-container text-on-error-container p-4 rounded-xl text-sm font-medium">
                Invalid username or password. Please try again.
            </div>
            {% endif %}
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-outline mb-2">Username</label>
                <input type="text" name="username" autofocus autocomplete="username" class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 focus:outline-none focus:border-primary text-primary font-medium" required>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-outline mb-2">Password</label>
                <input type="password" name="password" autocomplete="current-password" class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 focus:outline-none focus:border-primary text-primary font-medium" required>
            </div>
            
            <div class="flex items-center justify-between text-xs">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="remember" class="rounded border-outline-variant text-secondary w-4 h-4">
                    <span class="text-outline font-medium">Remember me</span>
                </label>
                <a href="{% url 'password_reset' %}" class="text-secondary font-bold hover:underline">Forgot Password?</a>
            </div>
            
            <button type="submit" class="w-full bg-primary text-on-primary py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-primary-container transition-colors cursor-pointer mt-2">
                <span class="material-symbols-outlined text-sm">login</span> Sign In
            </button>
        </form>
        
        <p class="text-center text-sm font-medium text-outline mt-8">
            Don't have an account? <a href="{% url 'register' %}" class="text-secondary font-bold hover:underline">Create one free</a>
        </p>
    </div>
</main>
{% endblock %}
