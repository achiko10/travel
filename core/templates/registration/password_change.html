{% extends "core/base.html" %}
{% block content %}
<main class="min-h-screen pt-32 pb-20 bg-surface-container-lowest">
    <div class="max-w-lg mx-auto px-6 text-center">
        <h1 class="text-3xl font-serif italic text-primary mb-4">Change Password</h1>
        <form method="post" class="space-y-5 text-left">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-outline mb-2">Old Password</label>
                <input type="password" name="old_password" class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 focus:outline-none focus:border-primary text-primary font-medium" required>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-outline mb-2">New Password</label>
                <input type="password" name="new_password1" class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 focus:outline-none focus:border-primary text-primary font-medium" required>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-outline mb-2">Confirm New Password</label>
                <input type="password" name="new_password2" class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 focus:outline-none focus:border-primary text-primary font-medium" required>
            </div>
            <button type="submit" class="w-full bg-primary text-on-primary py-4 rounded-2xl font-bold hover:bg-primary-container transition-colors cursor-pointer">Update Password</button>
        </form>
    </div>
</main>
{% endblock %}
