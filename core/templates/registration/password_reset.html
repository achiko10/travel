{% extends "core/base.html" %}
{% block content %}
<main class="min-h-screen pt-32 pb-20 bg-surface-container-lowest">
    <div class="max-w-lg mx-auto px-6 text-center">
        <h1 class="text-3xl font-serif italic text-primary mb-4">Password Reset</h1>
        <p class="text-outline mb-8">Enter your email and we'll send you a reset link.</p>
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-outline mb-2">Email Address</label>
                <input type="email" name="email" class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 focus:outline-none focus:border-primary text-primary font-medium" required>
            </div>
            <button type="submit" class="w-full bg-primary text-on-primary py-4 rounded-2xl font-bold hover:bg-primary-container transition-colors cursor-pointer">
                Send Reset Link
            </button>
        </form>
        <a href="{% url 'login' %}" class="mt-6 inline-block text-sm text-secondary font-bold hover:underline">Back to Sign In</a>
    </div>
</main>
{% endblock %}
