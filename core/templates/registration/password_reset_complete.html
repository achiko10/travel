{% extends "core/base.html" %}

{% block content %}
<main class="min-h-screen pt-32 pb-20 bg-surface-container-lowest flex items-center justify-center">
    <div class="max-w-md w-full mx-auto px-6 text-center">
        <div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="material-symbols-outlined text-6xl text-primary">check_circle</span>
        </div>
        <h1 class="text-3xl font-serif italic text-primary mb-4">Password Reset Complete</h1>
        <p class="text-outline mb-8">Your password has been set successfully. You can now sign in with your new password.</p>
        
        <a href="{% url 'login' %}" class="inline-flex items-center gap-2 bg-primary text-on-primary px-8 py-4 rounded-xl font-bold hover:bg-primary/90 transition-colors shadow-lg">
            <span class="material-symbols-outlined text-sm">login</span>
            Sign In Now
        </a>
    </div>
</main>
{% endblock %}
