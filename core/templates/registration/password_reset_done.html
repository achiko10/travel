{% extends "core/base.html" %}
{% block content %}
<main class="min-h-screen pt-32 pb-20 bg-surface-container-lowest">
    <div class="max-w-lg mx-auto px-6 text-center">
        <span class="material-symbols-outlined text-6xl text-secondary mb-4 block">mark_email_read</span>
        <h1 class="text-3xl font-serif italic text-primary mb-4">Check Your Email</h1>

        <a href="{% url 'login' %}" class="mt-8 inline-block bg-primary text-on-primary px-8 py-3 rounded-2xl font-bold hover:bg-primary-container transition-colors">Back to Sign In</a>
    </div>
</main>
